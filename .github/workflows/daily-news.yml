name: Daily News Fetch

on:
  workflow_dispatch: # 手动触发（由 cron-job.org 定时调用）

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch and classify news
        env:
          DASHSCOPE_API_KEY: ${{ secrets.ALIYUN }}
        run: node scripts/fetch-news.mjs

      - name: Recompute clock with news adjustment
        env:
          DASHSCOPE_API_KEY: ${{ secrets.ALIYUN }}
        run: node scripts/compute-clock.mjs

      - name: Save daily history snapshot
        run: node scripts/save-history.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data.json public/clock-history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily news update $(date -u +%Y-%m-%d)"
            git push
          fi
