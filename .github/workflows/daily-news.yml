name: Daily News Fetch

on:
  schedule:
    # 每天 UTC 00:05 = 北京时间 08:05（错开整点避免 GitHub 调度拥堵）
    - cron: '5 0 * * *'
  workflow_dispatch: # 手动触发

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch and classify news
        env:
          DASHSCOPE_API_KEY: ${{ secrets.ALIYUN }}
        run: node scripts/fetch-news.mjs

      - name: Recompute clock with news adjustment
        run: node scripts/compute-clock.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily news update $(date -u +%Y-%m-%d)"
            git push
          fi
